openapi: 3.0.3
info:
  title: Smart Print Shop API
  version: 1.0.0
  description: Complete API documentation for the Smart Print Shop system including Authentication and Activity Tracking.

servers:
  - url: http://localhost:8000/api
    description: Local development server

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string, format: password }

    TokenResponse:
      type: object
      properties:
        access: { type: string }
        refresh: { type: string }

    Customer:
      type: object
      properties:
        id: { type: integer, readOnly: true }
        name: { type: string }
        email: { type: string }
        phone: { type: string }
        address: { type: string }

    Order:
      type: object
      properties:
        id: { type: integer, readOnly: true }
        customer: { type: integer }
        order_date: { type: string, format: date-time }
        status: { type: string, enum: [pending, in_production, completed, delivered] }
        total_price: { type: number, format: float }

    PrintJob:
      type: object
      properties:
        id: { type: integer, readOnly: true }
        order: { type: integer }
        job_type: { type: string }
        quantity: { type: integer }
        price_per_unit: { type: number, format: float }
        status: { type: string }

    User:
      type: object
      properties:
        id: { type: integer, readOnly: true }
        username: { type: string }
        full_name: { type: string }
        email: { type: string }
        employee_id: { type: string }
        phone_number: { type: string }
        whatsapp_number: { type: string }
        is_verified: { type: boolean }

    Employee:
      type: object
      properties:
        id: { type: integer, readOnly: true }
        user: { type: integer }
        role: { type: string }

    ActivityLog:
      type: object
      properties:
        id: { type: integer, readOnly: true }
        user: { type: integer }
        action: { type: string }
        order: { type: integer, nullable: true }
        timestamp: { type: string, format: date-time }
        details: { type: string }

    Error:
      type: object
      properties:
        code: { type: integer }
        message: { type: string }

security:
  - BearerAuth: []

paths:
  # --- AUTHENTICATION ---
  /auth/login/:
    post:
      summary: Obtain JWT tokens
      security: [] 
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenResponse' }
        '401': { description: Unauthorized }

  # --- CUSTOMERS ---
  /customers/:
    get:
      summary: List customers
      responses:
        '200':
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Customer' }
    post:
      summary: Create customer
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Customer' }
      responses:
        '201': { description: Created }

  /customers/{id}/:
    get:
      summary: Retrieve customer
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Success }
        '404': { description: Not Found }
        '500':
          description: Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # --- ORDERS ---
  /orders/:
    get:
      summary: List orders
    post:
      summary: Create order
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Order' }
      responses:
        '201': { description: Created }

  /orders/{id}/:
    get:
      summary: Retrieve order
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Success }

  # --- PRINT JOBS ---
  /print_job/:
    get:
      summary: List print jobs
    post:
      summary: Create print job
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PrintJob' }
      responses:
        '201': { description: Created }

  /print_job/{id}/:
    get:
      summary: Retrieve job
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Success }

  # --- USERS & EMPLOYEES ---
  /users/:
    get:
      summary: List users
  
  /users/{id}/:
    get:
      summary: Retrieve user
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Success }

  /employees/:
    get:
      summary: List employees
    post:
      summary: Create employee
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Employee' }
      responses:
        '201': { description: Created }

  /employees/{id}/:
    get:
      summary: Retrieve employee
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Success }
        '404': { description: Not Found }
        '500':
          description: Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # --- ACTIVITY LOGS ---
  /activity-logs/:
    get:
      summary: Retrieve system history
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ActivityLog' }
# --- HEALTH CHECK ---
  /health/:
    get:
      summary: API Health Check
      security: [] 
      responses:
        '200':
          description: Server is online
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }                