openapi: 3.0.3
info:
  title: Smart Print Shop API
  version: 1.0.0
  description: API documentation for the Smart Print Shop system.

servers:
  - url: http://localhost:8000/api
    description: Local development server

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Customer:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string }
        phone: { type: string }
        address: { type: string }

    Order:
      type: object
      properties:
        id: { type: integer }
        customer: { type: integer }
        order_date: { type: string, format: date-time }
        status: { type: string, enum: [pending, in_production, completed, delivered] }
        total_price: { type: number, format: float }

    PrintJob:
      type: object
      properties:
        id: { type: integer }
        order: { type: integer }
        job_type: { type: string }
        quantity: { type: integer }
        price_per_unit: { type: number, format: float }
        status: { type: string }

    User:
      type: object
      properties:
        id: { type: integer }
        username: { type: string }
        full_name: { type: string }
        email: { type: string }
        employee_id: { type: string }
        phone_number: { type: string }
        whatsapp_number: { type: string }
        bio: { type: string }
        is_verified: { type: boolean }

    Employee:
      type: object
      properties:
        id: { type: integer }
        user: { type: integer }
        role: { type: string }

    ActivityLog:
      type: object
      properties:
        id: { type: integer }
        user: { type: integer }
        action: { type: string }
        order: { type: integer, nullable: true }
        job: { type: integer, nullable: true }
        timestamp: { type: string, format: date-time }
        details: { type: string }

security:
  - BearerAuth: []

paths:
  /customers/:
    get:
      summary: List customers
      security: [ { BearerAuth: [] } ]
      responses:
        '200':
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Customer' }
    post:
      summary: Create customer
      security: [ { BearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Customer' }
      responses:
        '201': { description: Customer created }

  /customers/{id}/:
    get:
      summary: Retrieve customer
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Customer retrieved }
        '404': { description: Not found }
    put:
      summary: Update customer
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Customer' }
      responses:
        '200': { description: Customer updated }
    delete:
      summary: Delete customer
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '204': { description: Customer deleted }

  /orders/:
    get:
      summary: List orders
      responses:
        '200':
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Order' }
    post:
      summary: Create order
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Order' }
      responses:
        '201': { description: Order created }

  /orders/{id}/:
    get:
      summary: Retrieve order
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Order retrieved }
        '404': { description: Not found }
    put:
      summary: Update order
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Order' }
      responses:
        '200': { description: Order updated }
    delete:
      summary: Delete order
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '204': { description: Order deleted }

  /print_job/:
    get:
      summary: List print jobs
      responses:
        '200':
          description: List of print jobs
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/PrintJob' }
    post:
      summary: Create print job
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PrintJob' }
      responses:
        '201': { description: Print job created }

  /print_job/{id}/:
    get:
      summary: Retrieve print job
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Print job retrieved }
        '404': { description: Not found }
    put:
      summary: Update print job
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PrintJob' }
      responses:
        '200': { description: Print job updated }
    delete:
      summary: Delete print job
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '204': { description: Print job deleted }

  /users/:
    get:
      summary: List users
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/User' }

  /users/{id}/:
    get:
      summary: Retrieve user
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: User retrieved }
        '404': { description: Not found }
    put:
      summary: Update user
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/User' }
      responses:
        '200': { description: User updated }
    delete:
      summary: Delete user
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '204': { description: User deleted }

  /employees/:
    get:
      summary: List employees
      responses:
        '200':
          description: List of employees
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Employee' }
    post:
      summary: Create employee
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Employee' }
      responses:
        '201': { description: Employee created }

  /employees/{id}/:
    get:
      summary: Retrieve employee
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Employee retrieved }
        '404': { description: Not found }
    put:
      summary: Update employee
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Employee' }
      responses:
        '200':